---
- name: OpenShift Administration and Automation Playbook (Developer Sandbox)
  hosts: localhost
  gather_facts: false

  vars:
    # Định nghĩa chính xác Namespace được cấp trên OpenShift Sandbox
    target_project: "nguyentaihieu004-dev"
    app_name: "elastic-demo-app" # Đổi tên ứng dụng sang Elastic
    db_password: "SuperSecretPassword123"
    
    # Định nghĩa thông tin RBAC cục bộ hợp lệ trong Namespace
    service_account_name: "demo-automation-sa"
    binding_name: "demo-view-binding"

  # =========================================================================
  # KHỐI CẤU HÌNH CREDENTIAL: Tự động nạp Token và API Endpoint từ AAP
  # =========================================================================
  environment:
    K8S_AUTH_HOST: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_HOST') | default(omit) }}"
    K8S_AUTH_API_KEY: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_API_KEY') | default(omit) }}"
    K8S_AUTH_VERIFY_SSL: "false" # Bỏ qua xác thực chứng chỉ SSL tự ký của Sandbox

  tasks:
    # 1. CẤU HÌNH TỰ ĐỘNG HÓA RBAC (Tạo ServiceAccount và gán quyền cục bộ trong Namespace)
    - name: Create a local ServiceAccount for automation tasks
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: "{{ service_account_name }}"
            namespace: "{{ target_project }}"
        state: present

    - name: Bind view role to the ServiceAccount (Allowed within local namespace)
      kubernetes.core.k8s:
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: "{{ binding_name }}"
            namespace: "{{ target_project }}"
          subjects:
            - kind: ServiceAccount
              name: "{{ service_account_name }}"
              namespace: "{{ target_project }}"
          roleRef:
            kind: ClusterRole
            name: view
            apiGroup: rbac.authorization.k8s.io
        state: present

    # 2. TẠO SECRET
    - name: Create Application Secret for Database Connection
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: app-db-secret
            namespace: "{{ target_project }}"
          type: Opaque
          stringData:
            DATABASE_PASSWORD: "{{ db_password }}"
        state: present

    # 3. TRIỂN KHAI ỨNG DỤNG (Đổi sang Elasticsearch Single-Node tối ưu cho Sandbox)
    - name: Deploy Web Application with Environment Variables
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ app_name }}"
            namespace: "{{ target_project }}"
            labels:
              app: "{{ app_name }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: "{{ app_name }}"
            template:
              metadata:
                labels:
                  app: "{{ app_name }}"
              spec:
                containers:
                  - name: elastic-container
                    # Sử dụng image chính thức từ Elastic Registry (Tránh nghẽn Docker Hub)
                    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
                    ports:
                      - containerPort: 9200 # Cổng Web API mặc định của Elasticsearch
                    resources:
                      limits:
                        cpu: "400m"
                        memory: "512Mi" # Tăng nhẹ RAM để Elastic chạy mượt mà
                      requests:
                        cpu: "200m"
                        memory: "256Mi"
                    env:
                      - name: discovery.type
                        value: "single-node" # Ép chạy chế độ đơn cụm để không tốn tài nguyên
                      - name: xpack.security.enabled
                        value: "false" # Tắt security tạm thời để bạn test nhanh không cần token phức tạp
                      - name: ES_JAVA_OPTS
                        value: "-Xms128m -Xmx256m" # Giới hạn bộ nhớ Java Heap trong giới hạn Sandbox
                      - name: DB_PASS
                        valueFrom:
                          secretKeyRef:
                            name: app-db-secret
                            key: DATABASE_PASSWORD
        state: present

    # 4. TẠO SERVICE NỘI BỘ (Đổi sang cổng 9200)
    - name: Create Internal Cluster Service for the App
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ app_name }}-svc"
            namespace: "{{ target_project }}"
            labels:
              app: "{{ app_name }}"
          spec:
            ports:
              - port: 9200
                targetPort: 9200
            selector:
              app: "{{ app_name }}"
        state: present

    # 5. TẠO ROUTE PHÁT HÀNH ỨNG DỤNG RA NGOÀI (Đổi sang targetPort 9200)
    - name: Expose Service via OpenShift Route
      kubernetes.core.k8s:
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ app_name }}-route"
            namespace: "{{ target_project }}"
          spec:
            to:
              kind: Service
              name: "{{ app_name }}-svc"
            port:
              targetPort: 9200
            tls:
              termination: edge
        state: present

    # ĐOẠN CUỐI: TRÍCH XUẤT VÀ KIỂM TRA ĐƯỜNG DẪN ỨNG DỤNG
    - name: Fetch the generated Route URL
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ app_name }}-route"
        namespace: "{{ target_project }}"
      register: route_info

    - name: Display Application URL
      ansible.builtin.debug:
        msg: "Elasticsearch Web API is ready at: https://{{ route_info.resources[0].spec.host }}"